    url: "http://export.arxiv.org/rss/cs.CV"
    category: "arxiv"
    enabled: true
    pre_filter: true
    keywords: "transformer|agent|reasoning|multimodal|rlhf|diffusion|rag|llm|gpt|claude|prompt"

