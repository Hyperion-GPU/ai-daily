# AI Daily Configuration

timezone: "Asia/Shanghai"

llm:
  provider: "siliconflow"  # options: siliconflow, newapi
  siliconflow:
    base_url: "https://api.siliconflow.cn/v1"
    api_key_env: "SILICONFLOW_API_KEY"
    model: "deepseek-ai/DeepSeek-V3.2"
    temperature: 0.3
    max_tokens: 1500
  newapi:
    base_url: "https://YOUR_NEWAPI_ENDPOINT/v1"
    api_key_env: "NEWAPI_API_KEY"
    model: "deepseek-chat"
    temperature: 0.3
    max_tokens: 1500

pipeline:
  seen_url_retention_days: 7     # Keep dedupe state for the last 7 days only
  fetch_full_text: true          # Fetch article body for non-arxiv sources when possible
  full_text_max_chars: 2000      # Upper bound for content passed to Stage 2
  full_text_concurrency: 5       # Concurrency limit for full-text extraction
  max_articles_per_day: 30       # Max number of articles in the final report
  max_articles_to_stage2: 50     # Max number of articles entering Stage 2
  non_arxiv_ratio: 0.4           # Share of non-arxiv items kept in Stage 1 and final output
  stage1_batch_size: 50          # Chunk size for Stage 1 title filtering
  stage2_concurrency: 5          # Concurrency for Stage 2 summarization
  time_window_hours: 48          # Only consider articles published in the last 48 hours

outputs:
  output_dir: "output"
  report_filename: "{date}.md"
  log_filename: "{date}.log"

feeds:
  # Research / papers
  - name: "Arxiv cs.AI"
    url: "http://export.arxiv.org/rss/cs.AI"
    category: "arxiv"
    enabled: true
    pre_filter: true
    keywords: "transformer|agent|reasoning|multimodal|rlhf|diffusion|rag|llm|gpt|claude|prompt"

  - name: "Arxiv cs.CL"
    url: "http://export.arxiv.org/rss/cs.CL"
    category: "arxiv"
    enabled: true
    pre_filter: true
    keywords: "transformer|agent|reasoning|multimodal|rlhf|diffusion|rag|llm|gpt|claude|prompt"

